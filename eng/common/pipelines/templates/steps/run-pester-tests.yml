parameters:
  - name: TargetDirectory
    type: string
  - name: CustomTestSteps
    type: object
    default: []
  - name: EnvVars
    type: object
    default: {}
  - name: TargetTags
    type: string
    default: ''

steps:

  - pwsh: |
       . (Join-Path "$(Build.SourcesDirectory)" eng common scripts Helpers PSModule-Helpers.ps1)
       Install-ModuleIfNotInstalled "Pester" "5.7.1" | Import-Module

       # Test: force install exact version 0.4.1 from internal feed
       $repoUrls = Get-ModuleRepositories "powershell-yaml"
       foreach ($url in $repoUrls) {
         $repo = (Get-PSRepository).Where({ $_.SourceLocation -eq $url })
         if ($repo.Count -eq 0) {
           Register-PSRepository -Name $url -SourceLocation $url -InstallationPolicy Trusted
           $repo = (Get-PSRepository).Where({ $_.SourceLocation -eq $url })
         }
         Write-Host "Installing powershell-yaml 0.4.1 from $url"
         Install-Module "powershell-yaml" -RequiredVersion "0.4.1" -Repository $repo.Name -Scope CurrentUser -Force
         Unregister-PSRepository -Name $url
       }
       Write-Host "Installed version: $((Get-Module -ListAvailable powershell-yaml).Version)"
       Import-Module powershell-yaml
    displayName: Install Pester, Az, and powershell-yaml modules

   # default test steps
  - ${{ if eq(length(parameters.CustomTestSteps), 0) }}:
    - pwsh: |
        $tags = "${{ parameters.TargetTags }}" -Split "," | ForEach-Object { return $_.Trim() }

        $config = New-PesterConfiguration
        $config.CodeCoverage.Enabled = $true
        $config.TestResult.Enabled = $true
        $config.Run.PassThru = $true

        if ($tags) {
          $config.Filter.Tag = $tags
        }

        Write-Host "Calling 'Invoke-Pester' in workingDirectory '$(Build.SourcesDirectory)/${{ parameters.TargetDirectory }}'. Pester tags filter: '$tags'"
        # https://pester.dev/docs/commands/Invoke-Pester
        Invoke-Pester -Configuration $config
      displayName: Run Pester Tests
      env: ${{ parameters.EnvVars }}
      workingDirectory: $(Build.SourcesDirectory)/${{ parameters.TargetDirectory }}

  - ${{ if not(eq(length(parameters.CustomTestSteps), 0)) }}:
    - ${{ parameters.CustomTestSteps }}

  - task: PublishTestResults@2
    displayName: Publish Test Results
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: NUnit
      testResultsFiles: $(Build.SourcesDirectory)/${{ parameters.TargetDirectory }}/testResults.xml
      testRunTitle: $(System.StageName)_$(Agent.JobName)_Tests

  - task: PublishCodeCoverageResults@2
    displayName: Publish Code Coverage to Azure DevOps
    condition: succeededOrFailed()
    inputs:
      summaryFileLocation: $(Build.SourcesDirectory)/${{ parameters.TargetDirectory }}/coverage.xml
      pathToSources: $(Build.SourcesDirectory)/${{ parameters.TargetDirectory }}
