# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/authorizationauthorization/ci.yml
      - sdk/authorizationauthorization/azure-resourcemanager-authorizationauthorization/
    exclude:
      - sdk/authorizationauthorization/pom.xml
      - sdk/authorizationauthorization/azure-resourcemanager-authorizationauthorization/pom.xml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/authorizationauthorization/ci.yml
      - sdk/authorizationauthorization/azure-resourcemanager-authorizationauthorization/
    exclude:
      - sdk/authorizationauthorization/pom.xml
      - sdk/authorizationauthorization/azure-resourcemanager-authorizationauthorization/pom.xml

parameters:
  - name: release_azureresourcemanagerauthorizationauthorization
    displayName: azure-resourcemanager-authorizationauthorization
    type: boolean
    default: false

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: authorizationauthorization
    Artifacts:
      - name: azure-resourcemanager-authorizationauthorization
        groupId: com.azure.resourcemanager
        safeName: azureresourcemanagerauthorizationauthorization
        releaseInBatch: ${{ parameters.release_azureresourcemanagerauthorizationauthorization }}
