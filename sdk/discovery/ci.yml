# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/discovery/ci.yml
      - sdk/discovery/azure-resourcemanager-discovery/
    exclude:
      - sdk/discovery/pom.xml
      - sdk/discovery/azure-resourcemanager-discovery/pom.xml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/discovery/ci.yml
      - sdk/discovery/azure-resourcemanager-discovery/
    exclude:
      - sdk/discovery/pom.xml
      - sdk/discovery/azure-resourcemanager-discovery/pom.xml

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: discovery
    Artifacts:
      - name: azure-resourcemanager-discovery
        groupId: com.azure.resourcemanager
        safeName: azureresourcemanagerdiscovery
