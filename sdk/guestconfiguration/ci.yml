# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/guestconfiguration/ci.yml
      - sdk/guestconfiguration/azure-resourcemanager-guestconfiguration/
    exclude:
      - sdk/guestconfiguration/pom.xml
      - sdk/guestconfiguration/azure-resourcemanager-guestconfiguration/pom.xml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/guestconfiguration/ci.yml
      - sdk/guestconfiguration/azure-resourcemanager-guestconfiguration/
    exclude:
      - sdk/guestconfiguration/pom.xml
      - sdk/guestconfiguration/azure-resourcemanager-guestconfiguration/pom.xml

parameters:
  - name: release_azureresourcemanagerguestconfiguration
    displayName: azure-resourcemanager-guestconfiguration
    type: boolean
    default: false

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: guestconfiguration
    Artifacts:
      - name: azure-resourcemanager-guestconfiguration
        groupId: com.azure.resourcemanager
        safeName: azureresourcemanagerguestconfiguration
        releaseInBatch: ${{ parameters.release_azureresourcemanagerguestconfiguration }}
