# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/billingtrust/ci.yml
      - sdk/billingtrust/azure-resourcemanager-billing-trust/
    exclude:
      - sdk/billingtrust/pom.xml
      - sdk/billingtrust/azure-resourcemanager-billing-trust/pom.xml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/billingtrust/ci.yml
      - sdk/billingtrust/azure-resourcemanager-billing-trust/
    exclude:
      - sdk/billingtrust/pom.xml
      - sdk/billingtrust/azure-resourcemanager-billing-trust/pom.xml

parameters:
  - name: release_azureresourcemanagerbillingtrust
    displayName: azure-resourcemanager-billing-trust
    type: boolean
    default: false

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: billingtrust
    Artifacts:
      - name: azure-resourcemanager-billing-trust
        groupId: com.azure.resourcemanager
        safeName: azureresourcemanagerbillingtrust
        releaseInBatch: ${{ parameters.release_azureresourcemanagerbillingtrust }}
