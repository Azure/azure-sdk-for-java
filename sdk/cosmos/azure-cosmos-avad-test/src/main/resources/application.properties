# Cosmos AVAD Test — Default Config
# Override via environment variables (same names, uppercase)

COSMOS_ENDPOINT=https://abhm-cfp-region-test.documents.azure.com:443/
COSMOS_KEY=<your-key-here>
COSMOS_DATABASE=graph_db
COSMOS_FEED_CONTAINER=avad-test
COSMOS_LEASE_CONTAINER=avad-test-leases
COSMOS_PREFERRED_REGION=West Central US

# Ingestor settings
OPS_PER_SEC=5000
DOC_SIZE_BYTES=1024
LOGICAL_PARTITION_COUNT=100000

# Log files
PRODUCED_LOG=produced.log
CONSUMED_LOG=consumed-avad.log

# Duration (0 = run forever)
DURATION_SECONDS=3600

# CFP worker count per reader mode
WORKER_COUNT=2
