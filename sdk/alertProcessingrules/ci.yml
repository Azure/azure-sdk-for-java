# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/alertProcessingrules/ci.yml
      - sdk/alertProcessingrules/azure-resourcemanager-alertprocessingrules/
    exclude:
      - sdk/alertProcessingrules/pom.xml
      - sdk/alertProcessingrules/azure-resourcemanager-alertprocessingrules/pom.xml

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - sdk/alertProcessingrules/ci.yml
      - sdk/alertProcessingrules/azure-resourcemanager-alertprocessingrules/
    exclude:
      - sdk/alertProcessingrules/pom.xml
      - sdk/alertProcessingrules/azure-resourcemanager-alertprocessingrules/pom.xml

parameters:
  - name: release_azureresourcemanageralertprocessingrules
    displayName: azure-resourcemanager-alertprocessingrules
    type: boolean
    default: false

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: alertProcessingrules
    Artifacts:
      - name: azure-resourcemanager-alertprocessingrules
        groupId: com.azure.resourcemanager
        safeName: azureresourcemanageralertprocessingrules
        releaseInBatch: ${{ parameters.release_azureresourcemanageralertprocessingrules }}
